<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>get_test</title>
  <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
  <script src="../ros/rosmain.js"></script>
  <script defer src="get_test.js"></script>
  <style>
    :root {
      color-scheme: dark;
      font-family: sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101820;
      color: #f5f7fb;
    }
    main {
      width: min(92vw, 420px);
      padding: 24px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }
    h1 {
      margin-top: 0;
      font-size: 1.4rem;
    }
    p {
      line-height: 1.5;
    }
    .buttons {
      display: flex;
      gap: 12px;
      margin: 16px 0;
    }
    button {
      flex: 1;
      padding: 12px;
      border: 0;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
    #startButton { background: #2f80ed; color: white; }
    #endButton { background: #444; color: white; }
    #status {
      margin: 0;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.25);
      white-space: pre-wrap;
    }
    .camera-panel {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.22);
    }
    .camera-panel h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }
    .camera-panel select {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px 12px;
      border: 0;
      border-radius: 10px;
      font-size: 0.95rem;
      background: rgba(255, 255, 255, 0.9);
      color: #101820;
    }
    .camera-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }
    #startCameraButton { background: #17935a; color: white; }
    #stopCameraButton { background: #6f4a4a; color: white; }
    #cameraPreview {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 10px;
      background: #000;
      object-fit: cover;
    }
    #cameraStatus {
      margin: 10px 0 0;
      font-size: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .camera-metrics {
      margin-top: 10px;
      font-size: 0.85rem;
      line-height: 1.45;
      white-space: pre-wrap;
      color: rgba(245, 247, 251, 0.88);
    }
    #header-contents {
      margin: 12px 0 0;
      font-size: 0.92rem;
      line-height: 1.4;
    }
    #xrOverlay {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(8, 12, 20, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    #xrOverlay[hidden] {
      display: none;
    }
    #controllerInfo {
      margin: 0;
      font-size: 0.92rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    #xrCanvas {
      width: 1px;
      height: 1px;
      opacity: 0;
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Meta Quest XR Test</h1>
    <p>get_test.html を Meta Quest Browser で開き、セッション開始 を押す！</p>
    <div class="buttons">
      <button id="startButton" disabled>確認中...</button>
      <button id="endButton" disabled>終了</button>
    </div>
    <p id="status">初期化中...</p>
    <section class="camera-panel">
      <h2>外カメラ送信</h2>
      <select id="cameraSelect" disabled>
        <option value="">カメラを選択...</option>
      </select>
      <div class="camera-actions">
        <button id="startCameraButton" disabled>カメラ開始</button>
        <button id="stopCameraButton" disabled>停止</button>
      </div>
      <video id="cameraPreview" playsinline autoplay muted></video>
      <p id="cameraStatus">カメラ初期化中...</p>
      <p id="cameraMetrics" class="camera-metrics">送信先: /hmd/camera/compressed</p>
    </section>
    <div id="header-contents"></div>
  </main>
  <section id="xrOverlay" hidden>
    <p id="controllerInfo">コントローラ待機中...</p>
  </section>
  <canvas id="xrCanvas"></canvas>
</body>
</html>
